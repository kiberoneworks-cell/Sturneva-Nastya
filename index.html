<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>КодоМания · Кликер для юных программистов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        /* главная карточка игры */
        .game-container {
            max-width: 650px;
            width: 100%;
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 1.8rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(76, 130, 245, 0.2);
            transition: all 0.2s;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        /* шапка с ресурсами */
        .stats-panel {
            background: #0f172ad9;
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid #2d3a5e;
            box-shadow: 0 8px 14px rgba(0,0,0,0.2);
        }

        .stat-card {
            background: #02061770;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .stat-emoji {
            font-size: 1.8rem;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #facc15;
            line-height: 1;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .click-area {
            background: radial-gradient(circle at 30% 20%, #1e293b, #0f172a);
            border-radius: 2.5rem;
            padding: 2rem 1rem;
            text-align: center;
            margin-bottom: 2rem;
            cursor: pointer;
            transition: transform 0.07s linear;
            border: 2px solid #3b82f6;
            box-shadow: 0 12px 0 #0c4a6e;
        }

        .click-area:active {
            transform: translateY(6px);
            box-shadow: 0 5px 0 #0c4a6e;
        }

        .code-btn {
            display: inline-block;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            font-size: 3.5rem;
            padding: 1rem 2rem;
            border-radius: 3rem;
            font-weight: bold;
            color: white;
            letter-spacing: 2px;
            box-shadow: 0 8px 20px rgba(37,99,235,0.4);
        }

        .click-title {
            font-size: 1.2rem;
            color: #cbd5e6;
            margin-top: 0.8rem;
            font-weight: 500;
        }

        /* магазин улучшений */
        .shop-section {
            margin-top: 1rem;
        }

        .shop-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 1rem;
            border-left: 5px solid #facc15;
            padding-left: 1rem;
        }

        .upgrades-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .upgrade-card {
            background: #1e293bbb;
            border-radius: 1.5rem;
            padding: 0.8rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            backdrop-filter: blur(4px);
            border: 1px solid #334155;
            transition: 0.1s;
        }

        .upgrade-info {
            flex: 2;
        }

        .upgrade-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upgrade-desc {
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .upgrade-stats {
            text-align: right;
        }

        .upgrade-power {
            background: #2d3a5e;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #facc15;
        }

        .upgrade-cost {
            font-weight: 800;
            font-size: 1.2rem;
            color: #facc15;
            margin-top: 5px;
        }

        .buy-btn {
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px 18px;
            border-radius: 3rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.1s ease;
            box-shadow: 0 4px 0 #1e3a8a;
        }

        .buy-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1e3a8a;
        }

        .buy-btn.disabled {
            background: #475569;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .level-badge {
            font-size: 0.7rem;
            background: #facc1522;
            padding: 2px 8px;
            border-radius: 60px;
            color: #facc15;
        }

        .reset-btn {
            background: rgba(100, 116, 139, 0.3);
            border: 1px solid #f87171;
            color: #fca5a5;
            padding: 6px 14px;
            border-radius: 3rem;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 1.5rem;
            width: 100%;
            transition: 0.1s;
        }

        .reset-btn:active {
            background: #7f1a1a40;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1.5rem;
            color: #5b6e8c;
        }

        @media (max-width: 550px) {
            .game-container {
                padding: 1rem;
            }
            .stat-value {
                font-size: 1.4rem;
            }
            .code-btn {
                font-size: 2.5rem;
                padding: 0.6rem 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="game-container">
    <!-- панель ресурсов -->
    <div class="stats-panel">
        <div class="stat-card">
            <div class="stat-emoji">💻</div>
            <div class="stat-info">
                <div class="stat-label">КОД-БАЛЛЫ</div>
                <div class="stat-value" id="scoreValue">0</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-emoji">⚡</div>
            <div class="stat-info">
                <div class="stat-label">МОЩНОСТЬ/КЛИК</div>
                <div class="stat-value" id="clickPowerValue">1</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-emoji">🤖</div>
            <div class="stat-info">
                <div class="stat-label">ПРОГРАММИСТЫ</div>
                <div class="stat-value" id="autoValue">0</div>
            </div>
        </div>
    </div>

    <!-- кликабельная зона -->
    <div class="click-area" id="clickZone">
        <div class="code-btn">
            &lt;/&gt; CODE
        </div>
        <div class="click-title">напиши строчку кода → +<span id="clickHint">1</span> код-баллов</div>
    </div>

    <!-- магазин апгрейдов -->
    <div class="shop-section">
        <div class="shop-title">
            <span>📈 ПРОКАЧКА СКИЛЛОВ</span>
        </div>
        <div class="upgrades-grid" id="upgradesList"></div>
    </div>

    <button class="reset-btn" id="resetGameBtn">⟳ СБРОС ПРОГРЕССА (начать заново)</button>
    <footer>⚡ Кликай по коду, покупай улучшения и стань гуру KiberOne!</footer>
</div>

<script>
    // ---------- ИГРОВОЙ ДВИЖОК "КодоМания" ----------
    // Данные улучшений (id, название, описание, базовая стоимость, прирост клика или пассив)
    const upgradesData = [
        {
            id: "betterIdeas",
            name: "📖 Лучшие алгоритмы",
            desc: "Увеличивает код-баллы за клик на +1",
            baseCost: 15,
            type: "click",
            power: 1,
            level: 0,
            maxLevel: 20,
            costMultiplier: 1.25
        },
        {
            id: "coffeeBoost",
            name: "☕ Кофеиновая оптимизация",
            desc: "Еще +2 к силе клика (мощный апгрейд)",
            baseCost: 60,
            type: "click",
            power: 2,
            level: 0,
            maxLevel: 15,
            costMultiplier: 1.3
        },
        {
            id: "juniorDev",
            name: "👩‍💻 Стажёр-программист",
            desc: "Автоматически генерирует 2 код-балла/сек",
            baseCost: 40,
            type: "auto",
            power: 2,
            level: 0,
            maxLevel: 25,
            costMultiplier: 1.2
        },
        {
            id: "seniorArchitect",
            name: "🧙‍♂️ Сеньор-архитектор",
            desc: "Пассивный доход +8 код-баллов/сек",
            baseCost: 180,
            type: "auto",
            power: 8,
            level: 0,
            maxLevel: 15,
            costMultiplier: 1.35
        }
    ];

    // Состояние игры
    let gameState = {
        score: 0,           // текущие код-баллы
        clickBasePower: 1,  // базовая сила клика (старт 1)
        clickBonus: 0,      // бонус от улучшений клика
        autoIncome: 0,      // пассивный доход в секунду
        upgrades: {}        // храним уровни каждого улучшения { id: level }
    };

    // Инициализация уровней
    function initUpgrades() {
        upgradesData.forEach(up => {
            gameState.upgrades[up.id] = 0;
        });
        // пересчитаем бонусы и пассивки
        recalcAllBonuses();
    }

    // пересчёт клик бонуса и автодохода на основе текущих уровней
    function recalcAllBonuses() {
        let newClickBonus = 0;
        let newAutoIncome = 0;

        upgradesData.forEach(up => {
            const level = gameState.upgrades[up.id];
            if (level === undefined) return;
            const totalPower = up.power * level;
            if (up.type === "click") {
                newClickBonus += totalPower;
            } else if (up.type === "auto") {
                newAutoIncome += totalPower;
            }
        });

        gameState.clickBonus = newClickBonus;
        gameState.autoIncome = newAutoIncome;
        // базовая сила клика 1 + бонус
        updateUIStats();
    }

    // получить полную силу клика
    function getTotalClickPower() {
        return gameState.clickBasePower + gameState.clickBonus;
    }

    // обработка клика
    function handleClick() {
        const power = getTotalClickPower();
        addScore(power);
        // анимация на клик-зоне
        const clickDiv = document.getElementById('clickZone');
        clickDiv.style.transform = 'scale(0.98)';
        setTimeout(() => { if(clickDiv) clickDiv.style.transform = ''; }, 100);
        // визуальный фидбек (вспышка)
        const scoreSpan = document.getElementById('scoreValue');
        if(scoreSpan) {
            scoreSpan.style.transform = 'scale(1.1)';
            setTimeout(() => { if(scoreSpan) scoreSpan.style.transform = ''; }, 150);
        }
    }

    function addScore(amount) {
        gameState.score += amount;
        if(gameState.score < 0) gameState.score = 0;
        updateUIStats();
        checkUpgradeButtonsState(); // обновляем активность кнопок
        saveToLocalStorage();
    }

    // списать баллы (если хватает)
    function spendScore(cost) {
        if (gameState.score >= cost) {
            gameState.score -= cost;
            updateUIStats();
            saveToLocalStorage();
            return true;
        }
        return false;
    }

    // покупка улучшения
    function buyUpgrade(upgradeId) {
        const upgrade = upgradesData.find(u => u.id === upgradeId);
        if (!upgrade) return false;
        const currentLevel = gameState.upgrades[upgradeId];
        if (currentLevel >= upgrade.maxLevel) {
            showToast("🏆 Максимальный уровень достигнут!");
            return false;
        }
        const cost = getUpgradeCost(upgrade);
        if (gameState.score >= cost) {
            // списываем
            gameState.score -= cost;
            gameState.upgrades[upgradeId] = currentLevel + 1;
            // пересчет бонусов
            recalcAllBonuses();
            updateUIStats();
            renderUpgradesList();    // перерисовываем магазин (цены изменятся)
            saveToLocalStorage();
            // приятный эффект
            showToast(`✨ ${upgrade.name} улучшен до уровня ${gameState.upgrades[upgradeId]} !`);
            return true;
        } else {
            showToast("❌ Не хватает код-баллов!");
            return false;
        }
    }

    // рассчитать стоимость улучшения с учётом уровня и множителя
    function getUpgradeCost(upgrade) {
        const level = gameState.upgrades[upgrade.id];
        let cost = upgrade.baseCost;
        for(let i = 0; i < level; i++) {
            cost = Math.floor(cost * upgrade.costMultiplier);
        }
        return Math.max(1, cost);
    }

    // обновление UI: счёт, сила клика, авто-доход, подсказка клика
    function updateUIStats() {
        document.getElementById('scoreValue').innerText = Math.floor(gameState.score);
        const totalClick = getTotalClickPower();
        document.getElementById('clickPowerValue').innerText = totalClick;
        document.getElementById('autoValue').innerText = gameState.autoIncome;
        document.getElementById('clickHint').innerText = totalClick;
    }

    // отрисовка всех карточек улучшений
    function renderUpgradesList() {
        const container = document.getElementById('upgradesList');
        if (!container) return;
        container.innerHTML = '';
        upgradesData.forEach(up => {
            const level = gameState.upgrades[up.id];
            const cost = getUpgradeCost(up);
            const maxed = level >= up.maxLevel;
            const canAfford = gameState.score >= cost && !maxed;
            const card = document.createElement('div');
            card.className = 'upgrade-card';
            card.innerHTML = `
                <div class="upgrade-info">
                    <div class="upgrade-name">
                        ${up.name} 
                        <span class="level-badge">ур. ${level}/${up.maxLevel}</span>
                    </div>
                    <div class="upgrade-desc">${up.desc} ${up.type === 'click' ? `(+${up.power} к клику/ур.)` : `(+${up.power} пассив/сек)`}</div>
                </div>
                <div class="upgrade-stats">
                    <div class="upgrade-power">⚡ сила: +${up.power * level}</div>
                    <div class="upgrade-cost">💰 ${cost}</div>
                </div>
            `;
            const buyButton = document.createElement('button');
            buyButton.innerText = maxed ? "МАКС" : "КУПИТЬ";
            buyButton.classList.add('buy-btn');
            if (maxed) {
                buyButton.classList.add('disabled');
                buyButton.disabled = true;
            } else if (!canAfford) {
                buyButton.classList.add('disabled');
                buyButton.disabled = true;
            } else {
                buyButton.disabled = false;
            }
            buyButton.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!maxed && canAfford) {
                    buyUpgrade(up.id);
                } else if (!canAfford && !maxed) {
                    showToast("🧠 Не хватает код-баллов! Кликай больше!");
                }
            });
            card.appendChild(buyButton);
            container.appendChild(card);
        });
        // дополнительно обновим состояние кнопок после любой покупки (но в buyUpgrade уже вызывается renderUpgradesList)
    }

    // Проверка и обновление активности кнопок при изменении счёта (без полной перерисовки - но перерисуем лучше)
    function checkUpgradeButtonsState() {
        // чтобы кнопки перерисовывались динамически при изменении счёта (вызывается при addScore)
        renderUpgradesList();
    }

    // сброс игры
    function resetGame() {
        if(confirm("⚠️ Сбросить весь прогресс? Все улучшения и код-баллы обнулятся.")) {
            gameState.score = 0;
            gameState.clickBonus = 0;
            gameState.autoIncome = 0;
            upgradesData.forEach(up => {
                gameState.upgrades[up.id] = 0;
            });
            recalcAllBonuses();
            updateUIStats();
            renderUpgradesList();
            saveToLocalStorage();
            showToast("🔄 Прогресс сброшен. Начинай кликать заново!");
        }
    }

    // Сохранение в localStorage
    function saveToLocalStorage() {
        const saveData = {
            score: gameState.score,
            upgrades: gameState.upgrades,
            timestamp: Date.now()
        };
        localStorage.setItem('kodomania_save', JSON.stringify(saveData));
    }

    function loadFromLocalStorage() {
        const raw = localStorage.getItem('kodomania_save');
        if (!raw) return false;
        try {
            const data = JSON.parse(raw);
            if (data.score !== undefined) gameState.score = data.score;
            if (data.upgrades) {
                // сливаем сохранённые уровни
                for (let id in data.upgrades) {
                    if (gameState.upgrades.hasOwnProperty(id)) {
                        gameState.upgrades[id] = data.upgrades[id];
                    }
                }
            }
            recalcAllBonuses();
            updateUIStats();
            renderUpgradesList();
            return true;
        } catch(e) { console.warn(e); return false; }
    }

    // простой тост
    let toastTimeout = null;
    function showToast(msg) {
        let toastEl = document.getElementById('dynamicToast');
        if(!toastEl) {
            toastEl = document.createElement('div');
            toastEl.id = 'dynamicToast';
            toastEl.style.position = 'fixed';
            toastEl.style.bottom = '30px';
            toastEl.style.left = '50%';
            toastEl.style.transform = 'translateX(-50%)';
            toastEl.style.backgroundColor = '#0f172ae6';
            toastEl.style.backdropFilter = 'blur(8px)';
            toastEl.style.color = '#facc15';
            toastEl.style.padding = '12px 24px';
            toastEl.style.borderRadius = '60px';
            toastEl.style.fontWeight = '600';
            toastEl.style.fontSize = '0.9rem';
            toastEl.style.border = '1px solid #facc15';
            toastEl.style.zIndex = '2000';
            toastEl.style.whiteSpace = 'nowrap';
            toastEl.style.fontFamily = 'monospace';
            document.body.appendChild(toastEl);
        }
        toastEl.innerText = msg;
        toastEl.style.opacity = '1';
        if(toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            if(toastEl) toastEl.style.opacity = '0';
        }, 1800);
    }

    // пассивный доход (интервал)
    let autoInterval = null;
    function startAutoIncome() {
        if(autoInterval) clearInterval(autoInterval);
        autoInterval = setInterval(() => {
            if(gameState.autoIncome > 0) {
                const passiveGain = gameState.autoIncome;
                addScore(passiveGain);
                // легкий визуал
                const autoSpan = document.getElementById('autoValue');
                if(autoSpan) {
                    autoSpan.style.transform = 'scale(1.1)';
                    setTimeout(() => { if(autoSpan) autoSpan.style.transform = ''; }, 200);
                }
            }
        }, 1000);
    }

    // инициализация событий
    function bindEvents() {
        const clickZone = document.getElementById('clickZone');
        if(clickZone) clickZone.addEventListener('click', handleClick);
        const resetBtn = document.getElementById('resetGameBtn');
        if(resetBtn) resetBtn.addEventListener('click', resetGame);
    }

    // запуск игры
    function initGame() {
        initUpgrades();
        loadFromLocalStorage(); // загрузит сохранения если есть
        recalcAllBonuses();     // синхронизация
        updateUIStats();
        renderUpgradesList();
        bindEvents();
        startAutoIncome();
        // проверяем кнопки при любых изменениях счёта (уже есть внутри addScore вызывает checkUpgradeButtonsState)
        // добавим также пересчёт кнопок при пассивном доходе (addScore уже вызывает)
    }

    // Запуск
    initGame();
</script>
</body>
</html>
